name: zakati
description: Zakat calculator and educational companion by Safi Solutions.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Fonts
  google_fonts: ^8.0.2

  # State Management
  flutter_riverpod: ^3.3.1

  # Navigation
  go_router: ^17.2.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # HTTP (for future live price API)
  dio: ^5.8.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  custom_lint: ^0.8.1

flutter:
  uses-material-design: true
